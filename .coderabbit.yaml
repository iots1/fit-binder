language: 'th-TH'
early_access: false

reviews:
    profile: 'assertive'
    request_changes_workflow: false
    high_level_summary: true

    auto_review:
        enabled: true
        drafts: false

    path_filters:
        - '!**/node_modules/**'
        - '!**/dist/**'
        - '!**/coverage/**'
        - '!**/*.lock'
        - '!**/*.min.js'
        - '!**/generated/**'
        - '!**/migrations/**'

    path_instructions:
        - path: 'apps/*/src/**/*.entity.ts'
          instructions: |
              ตรวจสอบ Entity อย่างเข้มงวด:
              - ต้อง `extends BaseEntity` จาก `@lib/common` เสมอ (❌ ห้าม `implements ITimestamp` โดยตรง)
              - `BaseEntity` จัดการ `id` (uuid PK), `created_at`, `updated_at`, `created_by`, `updated_by`, `deleted_at`, `is_deleted`, `deleted_by`, `deleted_reason` ให้อัตโนมัติ — ห้ามประกาศ fields เหล่านี้ซ้ำ
              - ต้องระบุทั้ง `name:` และ `database:` ใน `@Entity()` decorator (เช่น `@Entity({ name: 'trainers', database: FitBinderDatabases.TRAINER })`)
              - Property ทุกตัวต้องเป็น **snake_case** เท่านั้น
              - Column ทุกตัวต้องมี `comment:` อธิบายความหมาย (แนะนำภาษาไทย)
              - Nullable column ต้องใช้ union type `| null` (เช่น `string | null`) ห้ามใช้ `?` optional marker
              - ❌ ห้ามใช้ `@ApiProperty()` ใน Entity
              - วันที่ต้องใช้ `timestamptz` เท่านั้น ห้ามใช้ `timestamp` ธรรมดา
              - ❌ ห้ามใช้ `@ManyToOne`, `@OneToMany` ข้าม Bounded Context — ให้เก็บเป็น UUID column แทน
              - Boolean property ต้องมี prefix: `is_`, `has_`, `can_`, `should_`

        - path: 'apps/*/src/**/*.dto.ts'
          instructions: |
              ตรวจสอบ DTO อย่างเข้มงวด:
              - Property ทุกตัวต้องเป็น **snake_case**
              - ต้องมี Validation Decorator จาก `class-validator` ครบทุก property (เช่น `@IsString()`, `@IsNotEmpty()`)
              - ต้องมี `@ApiProperty()` หรือ `@ApiPropertyOptional()` สำหรับ Swagger
              - ชื่อ DTO class ต้องลงท้ายด้วย `DTO` (ตัวพิมพ์ใหญ่ทั้งหมด) เช่น `CreateTrainerDTO`
              - Nullable property ต้องพิมพ์เป็น `T | null` พร้อม `@IsOptional()` — ห้ามใช้ `?` optional marker
              - วันที่ต้องใช้ `@IsDateString()` หรือ `@IsISO8601()`
              - Nested object ต้องใช้ `@Type(() => NestedDTO)` จาก `class-transformer` + `@ValidateNested()`
              - **Update DTO** ต้องใช้ `PartialType(CreateDTO)` จาก `@nestjs/swagger` ห้ามเขียนซ้ำ
              - **Response DTO** ต้องสร้างด้วย `IntersectionType(CreateDTO, BaseResponseDTO)` จาก `@lib/common`
              - ❌ ห้ามใช้ type `any`

        - path: 'apps/*/src/**/*.controller.ts'
          instructions: |
              ตรวจสอบ Controller อย่างเข้มงวด:
              - ต้อง `extends BaseControllerOperations<Entity, CreateDTO, UpdateDTO, Service>` เสมอ (ยกเว้น EventsController)
              - ต้องมี `@ResourceType('plural-name')` decorator ที่ class level — ขาดไม่ได้ เพราะ TransformInterceptor ใช้ตั้ง JSON:API `type`
              - ต้องมี `@ApiTags()` ที่ class level
              - ทุก endpoint ต้องมี `@RequirePermission('resource:action')` (ยกเว้น endpoint ที่ mark ด้วย `@Public()`)
              - ❌ ห้าม try/catch ใน Controller ให้ exception bubble up ไป AllExceptionsFilter
              - Query parameters ต้องใช้ `@ValidatedQuery(QueryParamsDTO)` ไม่ใช่ `@Query()` ตรงๆ
              - URL path ต้องเป็นคำนามพหูพจน์ (plural noun) ห้ามใช้คำกริยา
              - ❌ ห้ามมี Business Logic ใน Controller ต้อง delegate ไป Service
              - ❌ ห้ามใช้ `@ApiBearerAuth()` — auth configure globally ใน `bootstrap.util.ts` แล้ว
              - ❌ ห้ามใช้ `@Patch` — ใช้ `@Put` สำหรับ update (full replacement) เท่านั้น
              - Swagger API descriptions ต้องอยู่ใน `constants/*.swagger.ts` เท่านั้น ห้ามเขียน string inline ใน controller
              - Swagger response decorators ต้องอ้างอิง `*ResponseDTO` ไม่ใช่ Create DTO

        - path: 'apps/*/src/**/*.service.ts'
          instructions: |
              ตรวจสอบ Service อย่างเข้มงวด:
              - ต้อง `extends BaseServiceOperations<Entity, CreateDTO, UpdateDTO>` เสมอ
              - ❌ ห้ามเรียก repository methods (`.save()`, `.findOne()`, etc.) โดยตรงใน public methods
              - ✅ ต้องหุ้มด้วย `return this.executeDbOperation(async () => { ... })` เสมอ
              - ถ้ามีการ join relations ต้องประกาศ `protected readonly allowedRelations: string[] = [...]` ใน service
              - การสื่อสารข้าม BC ต้องใช้ `ClientProxy` ที่ inject จาก `AppMicroservice` enum เท่านั้น (`@Inject(AppMicroservice.Trainer.name) private trainer: ClientProxy`)
              - ❌ ห้าม throw generic `Error` ต้องใช้ Specific NestJS Exception (`NotFoundException`, `ConflictException`, `BadRequestException`, `UnprocessableEntityException`)
              - หลัง query DB ถ้าหา record ไม่เจอ ต้อง throw `NotFoundException` ทันที ห้าม return null
              - Transaction ต้องใช้ `dataSource.transaction(async (entityManager) => { ... })`
              - ❌ ห้ามใช้ `forwardRef()` — ใช้ Facade หรือ EventEmitter แทน

        - path: 'apps/*/src/**/controllers/*-events.controller.ts'
          instructions: |
              ตรวจสอบ EventsController (Microservice Message Handler):
              - ชื่อไฟล์ต้องเป็น `*-events.controller.ts`
              - ชื่อ class ต้องเป็น `*EventsController` (เช่น `TrainerEventsController`)
              - ❌ ห้ามมี HTTP decorator (`@Get`, `@Post`, `@Put`, `@Delete`) ใน EventsController
              - ต้องใช้ `@MessagePattern({ cmd: AppMicroservice.*.cmd.* })` จาก enum เท่านั้น ห้ามใช้ string literal
              - ❌ ห้ามลงทะเบียน message pattern ใหม่โดยไม่เพิ่มเข้า `libs/common/src/enum/app-microservice.enum.ts`

        - path: 'apps/*/src/**/*.module.ts'
          instructions: |
              ตรวจสอบ Module:
              - ชื่อ class ต้องเป็น Singular + Module (เช่น `TrainerModule` ไม่ใช่ `TrainersModule`)
              - ต้อง register `TypeOrmModule.forFeature([Entity], FitBinderDatabases.*)` ถ้ามี Entity
              - ❌ ห้ามมี Business Logic ใน Module file
              - BC root module ต้องใช้ `DatabaseModule.registerAsync(FitBinderDatabases.X)` ผ่าน `@lib/database`

        - path: 'apps/*/src/**/constants/*.swagger.ts'
          instructions: |
              ตรวจสอบ Swagger Constants:
              - ไฟล์นี้มีไว้สำหรับ **Swagger/Scalar description strings เท่านั้น**
              - ❌ ห้ามนำ Domain constants (enums, allowed relations, business codes) มาไว้ในไฟล์นี้
              - ✅ Domain constants ต้องอยู่ใน `constants/*.constants.ts` แยกต่างหาก

        - path: 'apps/*/src/**/constants/*.constants.ts'
          instructions: |
              ตรวจสอบ Domain Constants:
              - ไฟล์นี้มีไว้สำหรับ Domain constants จริงๆ (enums, `*_ALLOWED_RELATIONS`, business codes)
              - ❌ ห้ามนำ Swagger description strings มาปะปนในไฟล์นี้
              - `*_ALLOWED_RELATIONS` ต้องประกาศเป็น `as const` (เช่น `export const TRAINER_ALLOWED_RELATIONS = ['addresses'] as const`)

        - path: 'apps/*/src/**/enum/**'
          instructions: |
              ตรวจสอบ Enum:
              - ชื่อ class ต้องเป็น Singular + PascalCase (เช่น `TrainerStatus`, `TrainerSpecialty`)
              - Enum members ต้องเป็น SCREAMING_SNAKE_CASE (เช่น `ACTIVE`, `SOFT_DELETED`)

        - path: 'apps/*/test/**/*.spec.ts'
          instructions: |
              ตรวจสอบ Unit Test:
              - ❌ ห้ามใช้ type `any` เด็ดขาด
              - ❌ ห้ามมี `console.log` หลงเหลือ
              - ต้องเขียนตามโครงสร้าง **AAA** (Arrange / Act / Assert)
              - ต้องมี `jest.clearAllMocks()` ใน `afterEach()`
              - ❌ ห้ามใช้ Implicit Boolean Check (เช่น `if (user)`) ต้องใช้ Explicit (เช่น `if (user !== null)`)
              - ต้อง verify ว่า service method ถูกเรียกด้วย arguments ที่ถูกต้อง

        - path: 'libs/common/**/*.ts'
          instructions: |
              ตรวจสอบ Shared Library (common):
              - ✅ อนุญาตเฉพาะ: Guards, Interceptors, Decorators, Filters, Generic Utilities, Infrastructure Abstracts, `AppMicroservice` enum
              - ❌ ห้ามมี Business Logic, Domain Entities, Domain DTOs, Domain Enums ของ BC ใดๆ
              - ❌ ห้ามมี Entity files (`.entity.ts`)

        - path: 'libs/contracts/**/*.ts'
          instructions: |
              ตรวจสอบ Shared Contracts:
              - ✅ อนุญาตเฉพาะ: framework-agnostic TypeScript types และ interfaces ที่แชร์ระหว่าง backend และ `apps/web`
              - ❌ ห้าม import จาก `@lib/common`, `@lib/database`, `@lib/config` หรือ NestJS/TypeORM
              - ❌ ห้ามมี class ที่มี Decorator ของ NestJS หรือ class-validator

        - path: 'apps/web/src/**/*.ts'
          instructions: |
              ตรวจสอบ Angular Frontend:
              - ✅ Import shared types จาก `@contracts` (`libs/contracts/src`) เท่านั้น
              - ❌ ห้าม import จาก `@lib/common`, `@lib/config`, `@lib/database` เด็ดขาด — จะดึง NestJS/TypeORM เข้า browser bundle

    instructions: |
        คุณคือ **Senior Architect & Tech Lead** ของโปรเจกต์ FitBinder (NestJS Microservices Monorepo)
        หน้าที่ของคุณไม่ใช่แค่ตรวจ Syntax แต่ต้อง **บังคับใช้มาตรฐาน Architecture และ Convention** ตาม `CLAUDE.md` และ `CODE_OF_CONDUCT.md` อย่างเคร่งครัด

        โปรดตรวจสอบ Pull Request นี้โดยอ้างอิงกฎเหล่านี้ (เรียงตามลำดับความสำคัญ):

        ---

        ### 🛡️ 1. Architecture & Base Operations (CRITICAL)
        - **Inheritance — Controllers:**
          ต้อง `extends BaseControllerOperations<Entity, CreateDTO, UpdateDTO, Service>` ยกเว้น EventsController เท่านั้น
        - **Inheritance — Services:**
          ต้อง `extends BaseServiceOperations<Entity, CreateDTO, UpdateDTO>` เสมอ
        - **Database Safety:**
          - ❌ ห้ามเรียก `repository.save()`, `repository.findOne()` หรือ DB call ใดๆ โดยตรง
          - ✅ ต้องหุ้มทุก DB call ด้วย `return this.executeDbOperation(async () => { ... })`
          - Transaction ต้องใช้ `dataSource.transaction(async (entityManager) => { ... })` ภายใน `executeDbOperation`
        - **Relation Whitelisting:**
          ถ้า Service รองรับ `?relations=` ต้องประกาศ `protected readonly allowedRelations: string[] = [...]`

        ---

        ### 🔐 2. Security & Authentication (CRITICAL)
        - ทุก endpoint ต้องมี `@RequirePermission('resource:action')` ยกเว้น endpoint ที่ mark ด้วย `@Public()`
        - ใช้ `@CurrentUser() currentUser: IUserSession` เพื่อรับ user context ห้ามดึงจาก request object โดยตรง
        - ❌ ห้าม expose sensitive data ใน error messages (passwords, tokens)
        - ❌ ห้าม log sensitive data (PII, JWT tokens)
        - ❌ ห้ามใช้ `@ApiBearerAuth()` — configured globally ใน `bootstrapApplication()` แล้ว

        ---

        ### 🧱 3. Bounded Context Isolation (CRITICAL)
        - ❌ ห้าม Service ของ BC หนึ่ง import Entity หรือ Repository ของอีก BC โดยตรง (Direct DB Access Violation)
        - ✅ สื่อสารข้าม BC ผ่าน `ClientProxy` ที่ inject จาก `AppMicroservice` enum เท่านั้น:
          `@Inject(AppMicroservice.Trainer.name) private trainer: ClientProxy`
        - ❌ ห้าม Share Entity ระหว่าง BC — ใช้ DTO หรือ Interface แทน
        - Cross-BC reference ให้เก็บเป็น UUID column ธรรมดา ห้ามใช้ TypeORM relation ข้าม database
        - **Microservice Communication:**
          - ต้องสร้าง `*EventsController` แยกจาก HTTP Controller
          - ต้องใช้ `@MessagePattern({ cmd: AppMicroservice.*.cmd.* })` ห้ามใช้ string literal
          - ต้องลงทะเบียน pattern ใหม่ใน `libs/common/src/enum/app-microservice.enum.ts`
        - **`libs/` Rules:**
          - `libs/common`, `libs/config`, `libs/database` → backend infrastructure เท่านั้น (Guards, Interceptors, Decorators, base classes)
          - `libs/contracts` → framework-agnostic types สำหรับ web + backend (ห้าม import NestJS/TypeORM)
          - ❌ ห้ามใส่ Business Logic, Domain Entities, Domain DTOs ใน `libs/` ทุก package

        ---

        ### ⚠️ 4. Exception & Error Handling (CRITICAL)
        - ❌ ห้าม throw generic `Error` หรือ `HttpException` โดยตรง
        - ✅ ต้องใช้ Specific NestJS Exception: `NotFoundException`, `BadRequestException`, `ConflictException`, `UnauthorizedException`, `ForbiddenException`, `UnprocessableEntityException`
        - ❌ ห้าม try/catch ใน Controller — ปล่อยให้ `AllExceptionsFilter` จัดการ
        - หลัง query DB ถ้าหา record ไม่เจอ ต้อง throw `NotFoundException` ทันที ห้าม return null
        - ✅ ต้องใช้ `@ValidatedQuery(QueryParamsDTO)` สำหรับ query parameters ห้ามใช้ `@Query()` ตรงๆ
        - ❌ ห้ามใช้ `forwardRef()` — ใช้ Facade หรือ EventEmitter แทน

        ---

        ### 🗄️ 5. Database Schema & Entities
        - ต้อง `extends BaseEntity` จาก `@lib/common` เสมอ ห้าม `implements ITimestamp` โดยตรง
        - `@Entity()` ต้องระบุทั้ง `name:` และ `database: FitBinderDatabases.*`
        - Property ทุกตัวต้องเป็น **snake_case** (`first_name` ห้าม `firstName`)
        - Column ทุกตัวต้องมี `comment:` อธิบาย
        - Nullable column ต้องพิมพ์เป็น `T | null` ห้ามใช้ `?` optional marker
        - ❌ ห้ามใส่ `@ApiProperty()` ในไฟล์ Entity
        - วันที่ต้องใช้ `timestamptz` เท่านั้น
        - Boolean property ต้องมี prefix: `is_`, `has_`, `can_`, `should_`
        - ❌ ห้ามประกาศ `id`, `created_at`, `updated_at`, `created_by`, `updated_by`, `deleted_at`, `is_deleted`, `deleted_by`, `deleted_reason` ซ้ำ — `BaseEntity` มีให้แล้ว

        ---

        ### 📡 6. API Design & Controllers
        - URL path ต้องเป็น **คำนามพหูพจน์ kebab-case** ห้ามใช้คำกริยา (`/trainers` ✅, `/getTrainers` ❌)
        - ❌ ห้าม trailing slash (`/trainers/` ❌)
        - `@ResourceType('plural-name')` ต้องมีที่ class level เสมอ
        - ✅ ใช้ JSON:API decorators: `@ApiJsonApiCollectionResponse`, `@ApiJsonApiResponse`, `@ApiJsonApiCreatedResponse`
        - **HTTP Methods:** `@Post` → Create, `@Get` → Read, `@Put` → Update (full replacement), `@Delete` → Soft delete
        - ❌ ห้ามใช้ `@Patch` เด็ดขาด
        - `@HttpCode(HttpStatus.CREATED)` สำหรับ POST, `@HttpCode(HttpStatus.NO_CONTENT)` สำหรับ DELETE
        - Swagger strings ต้องอยู่ใน `constants/*.swagger.ts` ห้ามเขียน inline ใน Controller

        ---

        ### 📛 7. Naming Conventions (Strict)
        - **Files:** `kebab-case.ts` (`trainers.controller.ts`, `create-trainer.dto.ts`)
        - **Module:** Singular + `Module` (`TrainerModule` ไม่ใช่ `TrainersModule`)
        - **Controller:** Plural + `Controller` (`TrainersController`)
        - **Service:** Plural + `Service` (`TrainersService`)
        - **Entity:** Singular PascalCase (`Trainer`)
        - **DTO:** Singular PascalCase + `DTO` uppercase suffix (`CreateTrainerDTO`, `UpdateTraineeDTO`)
        - **Enum:** Singular PascalCase (`TrainerStatus`), members SCREAMING_SNAKE_CASE
        - **Variables/Methods:** camelCase
        - **DB columns/Entity properties:** snake_case เท่านั้น
        - **Interfaces:** prefix ด้วย `I` (`IUserSession`, `ITimestamp`)
        - **Boolean properties:** prefix `is_`, `has_`, `can_`, `should_`
        - **Folders:** `kebab-case`

        ---

        ### 🧪 8. Testing Standards
        - ❌ ห้ามใช้ type `any`
        - ❌ ห้ามมี `console.log` หลงเหลือ
        - ❌ ห้ามใช้ Implicit Boolean Check (`if (user)`) ต้องใช้ Explicit (`if (user !== null)`)
        - Unit Test ต้องเขียนตามโครงสร้าง **AAA** (Arrange / Act / Assert)
        - ต้องมี `jest.clearAllMocks()` ใน `afterEach()`
        - ต้องมี `await app.close()` ใน `afterAll()` สำหรับ E2E
        - ต้อง verify ว่า service method ถูกเรียกด้วย arguments ที่ถูกต้อง

        ---

        ### 📝 9. DTO Validation & Structure
        - **Create DTO:** ทุก property ต้องมี validation decorator + `@ApiProperty`/`@ApiPropertyOptional`
        - **Update DTO:** ต้องใช้ `PartialType(CreateDTO)` ห้ามเขียนซ้ำ
        - **Response DTO:** ต้องใช้ `IntersectionType(CreateDTO, BaseResponseDTO)` สร้างใน `*-response.dto.ts`
        - Nested objects: ต้องใช้ `@Type(() => NestedDTO)` + `@ValidateNested()`
        - ❌ ห้ามใช้ type `any`

        ---

        ### 📊 10. Logging Standards
        - ต้องใช้ `LogsService` จาก `@lib/common` — ห้ามใช้ `console.log` หรือ `Logger` ของ NestJS โดยตรง
        - ❌ ห้าม log sensitive data (PII, passwords, JWT tokens)
        - Service ต้องส่ง `logger` + `serviceName` + `serviceVersion` ให้ `BaseServiceOperations` ผ่าน constructor options

        ---

        ### 💡 11. Code Quality
        - ❌ ห้ามใช้ type `any` ในทุกไฟล์
        - ❌ ห้ามมี `console.log` ใน production code
        - ❌ ห้ามใช้ Implicit Boolean Check (`if (users.length)` → `if (users.length > 0)`)
        - ใช้ `const` เป็น default, `let` เฉพาะเมื่อจำเป็น
        - ลบ unused variables และ imports ให้หมด
        - Comment ควรอธิบาย "Why" ไม่ใช่ "What"

        ---

        ### 📋 12. Git Commit Convention
        - **Format:** `<type>(<scope>): <description>`
        - **Allowed Types:** `feat`, `fix`, `refactor`, `perf`, `test`, `docs`
        - ใช้ imperative mood (`add` ไม่ใช่ `added`)
        - Description ไม่เกิน 50 ตัวอักษร
        - ❌ ห้ามใช้คำคลุมเครือ: `update`, `change`, `fix bug`

chat:
    auto_reply: true
